<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>HUIHUI Travel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #111110;
      --white: #FAFAF8;
      --gray-100: #F0EFEC;
      --gray-200: #E3E2DD;
      --gray-400: #B5B3AC;
      --gray-600: #706F69;
      --gray-800: #3C3B37;
      --dot: rgba(0,0,0,0.055);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--white);
      color: var(--black);
      min-height: 100vh;
      background-image: radial-gradient(var(--dot) 1px, transparent 1px);
      background-size: 20px 20px;
      overflow-x: hidden;
    }

    /* ─── Layout ─── */
    .page {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 22px 120px;
    }
    @media (min-width: 768px)  { .page { max-width: 700px;  padding: 0 40px 120px; } }
    @media (min-width: 1100px) { .page { max-width: 960px;  padding: 0 60px 120px; } }

    /* ─── Header ─── */
    .site-header {
      padding: 56px 0 44px;
      border-bottom: 1px solid var(--gray-200);
      margin-bottom: 52px;
      opacity: 0;
      animation: fadeUp 0.65s ease 0.05s forwards;
    }

    .site-eyebrow {
      font-size: 0.63rem;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: var(--gray-400);
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .site-title {
      font-family: 'Noto Serif KR', serif;
      font-size: clamp(2.4rem, 10vw, 3.8rem);
      font-weight: 900;
      color: var(--black);
      line-height: 1.0;
      letter-spacing: -0.025em;
    }

    .site-title .muted { color: var(--gray-400); }

    .site-desc {
      margin-top: 14px;
      font-size: 0.82rem;
      color: var(--gray-600);
      font-weight: 300;
      font-style: italic;
      line-height: 1.65;
    }

    /* ─── Section label ─── */
    .section-label {
      font-size: 0.62rem;
      font-weight: 500;
      letter-spacing: 0.2em;
      color: var(--gray-400);
      text-transform: uppercase;
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 12px;
      opacity: 0;
      animation: fadeUp 0.5s ease 0.15s forwards;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--gray-200);
    }

    /* ─── Trip grid ─── */
    .trip-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    @media (min-width: 600px)  { .trip-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; } }
    @media (min-width: 1100px) { .trip-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; } }

    /* ─── Trip card ─── */
    .trip-card {
      display: flex;
      flex-direction: column;
      text-decoration: none;
      color: inherit;
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 20px;
      padding: 22px 22px 20px;
      position: relative;
      overflow: hidden;
      cursor: pointer;
      opacity: 0;
      transform: translateY(14px);
      animation: fadeUp 0.5s ease forwards;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    }

    .trip-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 36px rgba(0,0,0,0.08);
      border-color: var(--gray-400);
    }
    .trip-card:active { transform: translateY(-1px); }

    /* accent strip */
    .trip-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--accent, var(--gray-400));
      border-radius: 20px 20px 0 0;
      opacity: 0.75;
    }

    /* stagger */
    .trip-card:nth-child(1)  { animation-delay: 0.10s; }
    .trip-card:nth-child(2)  { animation-delay: 0.16s; }
    .trip-card:nth-child(3)  { animation-delay: 0.22s; }
    .trip-card:nth-child(4)  { animation-delay: 0.28s; }
    .trip-card:nth-child(5)  { animation-delay: 0.34s; }
    .trip-card:nth-child(6)  { animation-delay: 0.40s; }
    .trip-card:nth-child(7)  { animation-delay: 0.46s; }
    .trip-card:nth-child(8)  { animation-delay: 0.52s; }
    .trip-card:nth-child(9)  { animation-delay: 0.58s; }
    .trip-card:nth-child(10) { animation-delay: 0.64s; }

    .card-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }

    .card-index {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.14em;
      color: var(--gray-400);
    }

    .card-arrow {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, border-color 0.2s;
    }
    .trip-card:hover .card-arrow {
      background: var(--accent, var(--black));
      border-color: transparent;
    }

    .card-arrow svg {
      width: 11px; height: 11px;
      stroke: var(--gray-600);
      fill: none;
      stroke-width: 2;
      transition: stroke 0.2s;
    }
    .trip-card:hover .card-arrow svg { stroke: #fff; }

    .card-name {
      font-family: 'Noto Serif KR', serif;
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.15;
      margin-bottom: 6px;
      color: var(--black);
    }

    .card-meta {
      font-size: 0.74rem;
      color: var(--gray-600);
      font-weight: 300;
      line-height: 1.55;
    }

    .card-bottom {
      margin-top: auto;
      padding-top: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-tag {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      padding: 4px 10px;
      border-radius: 50px;
      background: var(--gray-100);
      color: var(--gray-600);
    }

    .card-date {
      font-size: 0.62rem;
      color: var(--gray-400);
      font-weight: 300;
    }

    /* ─── Empty state ─── */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 72px 20px;
    }
    .empty-icon {
      font-size: 1.6rem;
      opacity: 0.18;
      margin-bottom: 14px;
    }
    .empty-title {
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--gray-600);
      margin-bottom: 6px;
    }
    .empty-desc {
      font-size: 0.74rem;
      font-weight: 300;
      color: var(--gray-400);
      line-height: 1.7;
    }

    /* ─── Footer ─── */
    .site-footer {
      margin-top: 72px;
      padding-top: 24px;
      border-top: 1px solid var(--gray-200);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-sig {
      font-family: 'Noto Serif KR', serif;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--gray-400);
    }
    .footer-count {
      font-size: 0.7rem;
      color: var(--gray-400);
      font-weight: 300;
    }

    /* ─── Animation ─── */
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<main class="page">

  <header class="site-header">
    <p class="site-eyebrow">국내 여행 기록</p>
    <h1 class="site-title">HUIHUI<br><span class="muted">Travel</span></h1>
    <p class="site-desc">다녀온 곳들의 사진과 기억을 모아두는 공간</p>
  </header>

  <p class="section-label">여행지</p>

  <div class="trip-grid" id="trip-grid"></div>

  <footer class="site-footer">
    <span class="footer-sig">HUIHUI Travel</span>
    <span class="footer-count" id="trip-count"></span>
  </footer>

</main>

<script>
/**
 * ═══════════════════════════════════════════
 *  HUIHUI Travel — 여행지 목록
 * ═══════════════════════════════════════════
 *
 *  새 여행지 html을 추가할 때마다
 *  아래 TRIPS 배열에 항목 하나를 추가하세요.
 *
 *  GitHub Actions를 설정하면 trips/ 폴더에
 *  파일만 올려도 이 배열이 자동으로 업데이트됩니다.
 *  (.github/workflows/update-trips.yml 참고)
 *
 *  ─── 항목 형식 ───────────────────────────
 *  {
 *    file:   "trips/이천.html",      ← 파일 경로
 *    name:   "이천",                 ← 여행지 이름
 *    date:   "2025.05",             ← 날짜
 *    desc:   "쌀밥과 도자기의 도시",  ← 한 줄 설명
 *    tag:    "경기도",               ← 지역 태그
 *    accent: "#A67C52"              ← 카드 포인트 컬러
 *  }
 * ═══════════════════════════════════════════
 */
const TRIPS = [
  {
    file:   "trips/이천.html",
    name:   "이천",
    date:   "2025.05",
    desc:   "쌀밥과 도자기, 황금빛 들판의 도시",
    tag:    "경기도",
    accent: "#A67C52"
  },
  /* ─ 예시: 새 여행지 추가 방법 ──────────────
  {
    file:   "trips/강릉.html",
    name:   "강릉",
    date:   "2025.07",
    desc:   "파도 소리와 커피 향의 해안 도시",
    tag:    "강원도",
    accent: "#4A7FA5"
  },
  ──────────────────────────────────────── */
];

/* ─── 렌더링 ─── */
(function render() {
  const grid = document.getElementById('trip-grid');
  const countEl = document.getElementById('trip-count');

  if (!TRIPS.length) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">✈</div>
        <p class="empty-title">아직 기록된 여행이 없어요</p>
        <p class="empty-desc">trips/ 폴더에 여행지 html을 추가하면<br>이곳에 자동으로 나타납니다</p>
      </div>`;
    return;
  }

  countEl.textContent = TRIPS.length + '곳';

  grid.innerHTML = TRIPS.map((t, i) => `
    <a
      class="trip-card"
      href="${t.file}"
      style="--accent: ${t.accent || '#888'};"
      aria-label="${t.name} 여행 기록 보기"
    >
      <div class="card-row">
        <span class="card-index">${String(i + 1).padStart(2, '0')}</span>
        <div class="card-arrow">
          <svg viewBox="0 0 12 12">
            <line x1="2" y1="10" x2="10" y2="2"/>
            <polyline points="4.5,2 10,2 10,7.5"/>
          </svg>
        </div>
      </div>
      <div class="card-name">${t.name}</div>
      <div class="card-meta">${t.desc || ''}</div>
      <div class="card-bottom">
        <span class="card-tag">${t.tag || ''}</span>
        <span class="card-date">${t.date || ''}</span>
      </div>
    </a>
  `).join('');
})();
</script>

</body>
</html>
