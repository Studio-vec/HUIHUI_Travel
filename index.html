<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Travel MASIL Korea – huihui-log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #FFF8EB;
      --purple-deep: #7A57CD;
      --purple-mid: #946EEE;
      --purple-light: #C8B1FF;
      --purple-pale: #EDE5FF;
      --cream: #FFF8EB;
      --text-dark: #2a1a4a;
      --text-mid: #5a3e8a;
      --shadow-purple: rgba(122,87,205,0.5);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg); font-family:'Noto Sans KR',sans-serif; min-height:100vh; overflow-x:hidden; }

    /* ── HEADER ── */
    .header { position: relative; width: 100%; }

    .header-svg-wrap {
      position: relative;
      width: 100%;
      /* 모바일: SVG 원본 비율 유지 / PC: 최대 높이 고정 */
      height: clamp(120px, 41.2vw, 200px);
      overflow: hidden;
    }

    /* 배경: 항상 100% 너비, 높이는 wrap에 맞춤 */
    .header-bg-svg {
      display: block;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* 로고: 세로 중앙, 가로 중앙 */
    .header-logo-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      pointer-events: none;
    }
    .header-logo-svg {
      display: block;
      /* 높이 기준으로 맞추고, 너비 최대 제한 */
      height: clamp(60px, 10vw, 100px);
      width: auto;
      max-width: min(90%, 500px);
    }

    /* 언어 버튼 */
    .lang-btn {
      position: absolute;
      right: clamp(8px, 2.5%, 24px);
      top: clamp(4px, 4%, 12px);
      display: flex; align-items: center; gap: 5px;
      background: white;
      border: 1.5px solid #ABB9CA;
      border-radius: 20px;
      padding: 3px 9px;
      font-size: clamp(9px, 1.5vw, 11px);
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text-dark);
      cursor: pointer; white-space: nowrap;
      transition: all 0.2s;
      z-index: 2;
    }
    .lang-btn:hover { background: var(--purple-pale); }
    .lang-btn svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* ── CHECKOUT STATUS ── */
    .checkout-status {
      text-align:center;
      padding: clamp(10px,2vw,20px) 0 clamp(6px,1vw,10px);
      font-family:'Noto Sans KR',sans-serif;
      font-size: clamp(11px,1.8vw,14px);
      color: var(--text-mid);
      letter-spacing: 0.05em;
    }

    /* ── KEY GRID ── */
    .grid-section {
      width: 100%;
      padding: 0 clamp(8px,3vw,48px) clamp(90px,14vw,120px);
    }
    .key-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: clamp(6px,1.5vw,16px);
      max-width: 1148px;
      margin: 0 auto;
    }
    @media (min-width:768px) {
      .key-grid { grid-template-columns: repeat(5,1fr); }
    }

    /* ── KEY CARD ── */
    .key-card {
      position:relative; cursor:pointer;
      transition: transform 0.18s ease, filter 0.18s ease;
    }
    .key-card:hover { filter:brightness(1.05); }
    .key-card.coming-soon { cursor:default; }
    .key-card.coming-soon:hover { transform:none; filter:none; }

    .card-3d {
      position:relative; width:100%;
      padding-bottom:138%;
    }
    .card-slot-img {
      position:absolute; inset:0;
      width:100%; height:100%;
      display:block;
    }
    /* ── NAME TAG ── */
    .card-name {
      position:absolute;
      top:3%; left:8%; right:8%;
      z-index:3;
    }
    .card-name-img {
      display:block; width:100%; height:auto;
    }
    .card-name span {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      font-family:'Playfair Display',serif;
      font-style:italic;
      font-size: clamp(8px,1.6vw,15px);
      font-weight:400;
      color:var(--text-dark);
      letter-spacing:0.03em;
      white-space:nowrap;
    }
    .card-name.coming-soon span {
      font-family:'Cormorant Garamond',serif;
      font-size: clamp(6px,1.1vw,10px);
      font-weight:300;
      color:var(--text-mid);
      letter-spacing:0.1em;
    }
    .card-key-img {
      position:absolute;
      top:20%; left:12%; right:12%; bottom:14%;
      display:flex; align-items:center; justify-content:center;
      z-index:2;
    }
    .card-key-img > * {
      transform-origin: center top;
      animation: none;
    }
    .key-card:not(.coming-soon):hover .card-key-img > * {
      animation: keySwing 1.2s ease-in-out infinite;
    }

    /* ── BELL ── */
    .bell-wrapper {
      position: fixed;
      /* 푸터 높이(19.34vw, 최대 76px) 기준으로 벨 위치 고정 */
      bottom: clamp(28px, 12vw, 58px);
      right: clamp(12px, 3vw, 40px);
      z-index: 110;
      cursor: pointer;
      /* 벨 너비도 푸터 높이 기반으로 비례 고정 */
      width: clamp(55px, 10vw, 100px);
      user-select: none;
      background: transparent;
    }
    .bell-top {
      position:relative; z-index:2;
      transform-origin: center bottom;
    }
    .bell-top.ringing { animation: bellRingTop 0.45s ease; }
    .bell-bottom { position:relative; z-index:1; margin-top:-4%; }
    .bell-img { width:100%; height:auto; display:block; }
    .bell-img-down { margin-top:-6%; }

    /* ── FOOTER ── */
    .footer {
      position:fixed; bottom:0; left:0;
      width:100%; z-index:100;
    }
    .bottom-svg { display:block; width:100%; height:auto; }

    @keyframes keySwing {
      0%   { transform: rotate(0deg); }
      15%  { transform: rotate(18deg); }
      35%  { transform: rotate(-15deg); }
      55%  { transform: rotate(10deg); }
      70%  { transform: rotate(-7deg); }
      82%  { transform: rotate(4deg); }
      91%  { transform: rotate(-2deg); }
      100% { transform: rotate(0deg); }
    }
    @keyframes bellRingTop {
      0%   { transform: rotate(0deg) translateY(0); }
      20%  { transform: rotate(14deg) translateY(-4px); }
      40%  { transform: rotate(-11deg) translateY(-2px); }
      60%  { transform: rotate(8deg) translateY(-3px); }
      80%  { transform: rotate(-5deg) translateY(-1px); }
      100% { transform: rotate(0deg) translateY(0); }
    }
  </style>

  <script>
    const langs = [
      {label:'한국어',code:'ko'},
      {label:'English',code:'en'},
      {label:'日本語',code:'ja'},
      {label:'中文',code:'zh'},
    ];
    let langIdx = 0;
    const checkoutTexts = {
      ko:'2/nnn 체크아웃 완료',
      en:'2/nnn checkouts complete',
      ja:'2/nnn チェックアウト完了',
      zh:'2/nnn 退房完成',
    };
    function cycleLang() {
      langIdx = (langIdx+1) % langs.length;
      document.getElementById('langLabel').textContent = langs[langIdx].label;
      document.getElementById('checkoutStatus').textContent = checkoutTexts[langs[langIdx].code];
    }
    function goTo(url) { window.location.href = url; }
    function ringBell() {
      const top = document.getElementById('bellTop');
      top.classList.add('ringing');
      setTimeout(()=>top.classList.remove('ringing'), 500);
    }
  </script>
