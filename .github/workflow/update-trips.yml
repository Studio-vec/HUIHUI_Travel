name: 여행지 목록 자동 업데이트

on:
  push:
    paths:
      - 'trips/**.html'   # trips/ 폴더에 html 파일이 추가/수정될 때만 실행

permissions:
  contents: write

jobs:
  update-trips:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 여행지 목록 스캔 & index.html 업데이트
        run: node .github/scripts/update-trips.js

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "chore: 여행지 목록 자동 업데이트"
          git push
